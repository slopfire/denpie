syntax = "proto3";

package denpie;

message TipsQuery {
    uint64 count = 1;
    string topics = 2; // comma separated
    string tipcard_type = 4; // optional: "repeatable_tip", "casual_tip", or "manual_tip"
    repeated int64 exclude_card_ids = 5;
    string manual_content = 6;
    string manual_compressed_content = 7;
    reserved 3; // was topic_class
}

message CustomTipcardRequest {
    string topic = 1;
    string full_content = 2;
    string compressed_content = 3;
    string title = 4;
}

message TipCardResponse {
    int64 id = 1;
    string topic = 2;
    string full_content = 3;
    string compressed_content = 4;
    string tipcard_type = 6;
    bool pinned = 7;
    reserved 5; // was topic_class
}

message TipsResponse {
    repeated TipCardResponse tips = 1;
}

message ReviewPayload {
    int64 card_id = 1;
    uint32 grade = 2;
    string action = 3;
}

message GetTopicsResponse {
    repeated string topics = 1;
}

message Empty {}

message ApiRequest {
    // API key for all operations except bootstrap_api_key. The key owner
    // determines which user's topics, cards, settings, and keys are visible.
    string auth = 1;

    oneof op {
        BootstrapApiKeyRequest bootstrap_api_key = 2;
        TipsQuery tips = 3;
        ReviewPayload review = 4;
        Empty get_topics = 5;
        Empty get_settings = 7;
        UpdateSettingsRequest update_settings = 8;
        CreateApiKeyRequest create_api_key = 9;
        Empty list_api_keys = 10;
        DeleteByIdRequest delete_api_key = 11;
        Empty list_admin_topics = 12;
        Empty list_tipcards = 13;
        DeleteByIdRequest delete_tipcard = 14;
        Empty get_summary = 15;
        Empty list_app_topics = 16;
        UpdateTopicRequest update_topic = 17;
        DeleteByIdRequest delete_topic = 18;
        PinTipcardRequest pin_tipcard = 19;
        CustomTipcardRequest submit_custom_tipcard = 20;
        ForceDailyRefreshRequest force_daily_refresh = 21;
    }
}

message ApiResponse {
    oneof result {
        ApiKeyCreated api_key_created = 1;
        TipsResponse tips = 2;
        Empty ok = 3;
        GetTopicsResponse topics = 4;
        Settings settings = 6;
        ApiKeys api_keys = 7;
        AdminTopics admin_topics = 8;
        Tipcards tipcards = 9;
        AppSummary summary = 10;
        AppTopics app_topics = 11;
        ForceDailyRefreshResponse force_daily_refresh = 12;
    }
}

message BootstrapApiKeyRequest {
    // Setup token printed by the server. This only works after a setup admin
    // user exists; the created key belongs to the first admin user.
    string admin_token = 1;
    string client_name = 2;
}

message CreateApiKeyRequest {
    string client_name = 1;
}

message ApiKeyCreated {
    string api_key = 1;
}

message DeleteByIdRequest {
    int64 id = 1;
}

message Settings {
    string model = 1;
    string compress_model = 2;
    string template = 3;
    string api_key = 4;
    string base_url = 5;
    string compress_base_url = 6;
    string reasoning_effort = 7;
    string compress_reasoning_effort = 8;
    string color_scheme = 9;
    bool autoupdate_enabled = 10;
    string autoupdate_repo = 11;
    string autoupdate_branch = 12;
    uint64 autoupdate_check_interval_secs = 13;
    string autoupdate_command = 14;
    string autoupdate_last_seen_sha = 15;
    string daily_time_zone = 16;
    string daily_update_time = 17;
    uint64 max_active_cards = 18;
    string compression_level = 19;
}

message UpdateSettingsRequest {
    optional string model = 1;
    optional string compress_model = 2;
    optional string template = 3;
    optional string api_key = 4;
    optional string base_url = 5;
    optional string compress_base_url = 6;
    optional string reasoning_effort = 7;
    optional string compress_reasoning_effort = 8;
    optional string color_scheme = 9;
    optional bool autoupdate_enabled = 10;
    optional string autoupdate_repo = 11;
    optional string autoupdate_branch = 12;
    optional uint64 autoupdate_check_interval_secs = 13;
    optional string autoupdate_command = 14;
    optional string daily_time_zone = 15;
    optional string daily_update_time = 16;
    optional uint64 max_active_cards = 17;
    optional string compression_level = 18;
}

message ApiKeyInfo {
    int64 id = 1;
    string client_name = 2;
    string created_at = 3;
}

message ApiKeys {
    repeated ApiKeyInfo keys = 1;
}

message AdminTopic {
    int64 id = 1;
    string name = 2;
    string prompt_template = 3;
    uint32 daily_card_count = 4;
    string daily_time_zone = 5;
    string daily_update_time = 6;
    string compression_level = 7;
}

message AdminTopics {
    repeated AdminTopic topics = 1;
}

message TipcardInfo {
    int64 id = 1;
    string topic_name = 2;
    string full_content = 3;
    string compressed_content = 4;
    string created_at = 5;
    string tipcard_type = 6;
    string status = 8;
    string next_review_at = 9;
    uint32 repeat_count = 10;
    bool pinned = 11;
    reserved 7; // was topic_class
}

message Tipcards {
    repeated TipcardInfo cards = 1;
}

message AppSummary {
    int64 topics = 1;
    int64 total_cards = 2;
    int64 due_cards = 3;
    int64 active_cards = 4;
}

message AppTopicInfo {
    int64 id = 1;
    string name = 2;
    string tipcard_type = 4;
    string prompt_template = 5;
    int64 total_cards = 6;
    int64 due_cards = 7;
    int64 completed_cards = 8;
    uint32 daily_card_count = 9;
    string daily_time_zone = 10;
    string daily_update_time = 11;
    string compression_level = 12;
    reserved 3; // was class_name
}

message AppTopics {
    repeated AppTopicInfo topics = 1;
}

message UpdateTopicRequest {
    int64 id = 1;
    optional string prompt_template = 2;
    optional uint32 daily_card_count = 3;
    optional string daily_time_zone = 4;
    optional string daily_update_time = 5;
    optional string compression_level = 6;
}

message PinTipcardRequest {
    int64 id = 1;
    bool pinned = 2;
}

message ForceDailyRefreshRequest {
    string topics = 1; // comma separated
    string tipcard_type = 3; // optional: "repeatable_tip" or "casual_tip"
    reserved 2; // was topic_class
}

message ForceDailyRefreshResponse {
    uint64 refreshed_cards = 1;
}

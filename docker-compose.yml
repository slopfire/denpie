services:
  denpie:
    image: slopsphere/denpie:latest
    user: "${DENPIE_UID}:${DENPIE_GID}"
    environment:
      DENPIE_BIND_ADDR: "0.0.0.0:3017"
      DENPIE_DATA_DIR: "/var/lib/denpie"
    volumes:
      - "${DENPIE_HOST_DATA_DIR:-/var/lib/denpie}:/var/lib/denpie"
    ports:
      - "3017:3017"

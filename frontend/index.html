            [data-theme] {
                --bg: hsl(var(--background));
                --surface: hsl(var(--card));
                --surface-muted: hsl(var(--muted-hsl));
                --surface-strong: hsl(var(--accent-hsl));
                --text: hsl(var(--foreground));
                --muted: hsl(var(--muted-foreground));
                --border: hsl(var(--border-hsl));
                --primary: hsl(var(--primary-hsl));
                --primary-soft: hsl(var(--accent-hsl));
                --primary-text: hsl(var(--primary-foreground));
                --secondary: hsl(var(--chart-4));
                --tertiary: hsl(var(--chart-3));
                --danger: hsl(var(--destructive-hsl));
                --ok: hsl(var(--chart-2));
                --glass-blur: 10px;
                --glass-card-alpha: 0.58;
                --glass-muted-alpha: 0.5;
                --glass-strong-alpha: 0.56;
                --glass-control-alpha: 0.72;
                --glass-primary-alpha: 1;
                --glass-popover-alpha: 0.62;
                --glass-panel-radius: 1rem;
                --glass-control-radius: 0.8rem;
            }
            [data-theme][data-blur-intensity="none"] {
                --glass-blur: 0px;
            }
            [data-theme][data-blur-intensity="low"] {
                --glass-blur: 4px;
            }
            [data-theme][data-blur-intensity="medium"] {
                --glass-blur: 10px;
            }
            [data-theme][data-blur-intensity="full"] {
                --glass-blur: 18px;
            }
            [data-theme][data-transparency="none"] {
                --glass-card-alpha: 1;
                --glass-muted-alpha: 1;
                --glass-strong-alpha: 1;
                --glass-control-alpha: 1;
                --glass-primary-alpha: 1;
                --glass-popover-alpha: 0.94;
            }

                --glass-card-alpha: 0.72;
                --glass-muted-alpha: 1;
                --glass-strong-alpha: 1;
                --glass-control-alpha: 1;
                --glass-primary-alpha: 1;
                --glass-popover-alpha: 0.82;
            }
            [data-theme][data-transparency="medium"] {
                --glass-card-alpha: 0.58;
                --glass-muted-alpha: 0.5;
                --glass-strong-alpha: 0.56;

                --glass-primary-alpha: 1;

                --glass-strong-alpha: 0.58;
                --glass-control-alpha: 0.46;
                --glass-primary-alpha: 0.86;
                --glass-popover-alpha: 0.68;
            }
            * {
                box-sizing: border-box;
            }
            body {
                margin: 0;
                background-color: hsl(var(--background));
                background-image:
                    linear-gradient(
                        90deg,
                        hsl(var(--background)) 0%,
                        hsl(var(--background) / 0.95) 43%,
                        hsl(var(--background) / 0.72) 67%,
                        hsl(var(--background) / 0.4) 100%
                    ),
                    url("/static/assets/app-background.webp");
                background-repeat: no-repeat;
                background-position:
                    center,
                    right center;
                background-size:
                    cover,
                    auto 100vh;
                background-attachment: fixed;
                color: var(--text);
                font-family:
                    ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
                    "Segoe UI", sans-serif;
                font-size: 14px;
            }
            .radix-icon {
                font-size: 22px;
                line-height: 1;
                display: inline-flex;
                align-items: center;
                justify-content: center;
                width: 1em;
                height: 1em;
            }
            .surface {
                background: hsl(var(--card) / var(--glass-card-alpha));
                color: hsl(var(--card-foreground));
                border-color: hsl(var(--border-hsl));
                box-shadow: var(--shadow);
                backdrop-filter: blur(var(--glass-blur)) saturate(1.15);
            }
            html .surface {
                -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(1.1501);
            }
            .muted-surface {
                background: hsl(var(--muted-hsl) / var(--glass-muted-alpha));
                color: hsl(var(--muted-foreground));
                border-color: hsl(var(--border-hsl));
                backdrop-filter: blur(var(--glass-blur)) saturate(1.1);
            }
            html .muted-surface {
                -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(1.1);
            }
            .strong-surface {
                background: hsl(var(--accent-hsl) / var(--glass-strong-alpha));
                color: hsl(var(--accent-foreground));
                backdrop-filter: blur(var(--glass-blur)) saturate(1.1);
            }
            html .strong-surface {
                -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(1.1);
            }
            .text-muted {
                color: var(--muted);
            }
            .text-primary {
                color: var(--primary);
            }
            .bg-primary {
                background: hsl(var(--primary-hsl));
                color: hsl(var(--primary-foreground));
            }
            .bg-primary-solid {
                background: hsl(
                    var(--primary-hsl) / var(--glass-primary-alpha)
                );
                color: hsl(var(--primary-foreground));
                backdrop-filter: blur(var(--glass-blur)) saturate(1.1);
            }
            html .bg-primary-solid {
                -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(1.1);
            }
            .bg-primary-soft {
                background: hsl(var(--accent-hsl) / var(--glass-strong-alpha));
                color: hsl(var(--accent-foreground));
            }
            .border-token {
                border-color: var(--border);
            }
            .nav-item {
                color: var(--muted);
            }
            .nav-item:hover {
                background: hsl(var(--muted-hsl) / var(--glass-muted-alpha));
                color: var(--text);
            }
            .nav-item.active {
                background: hsl(var(--accent-hsl) / var(--glass-strong-alpha));
                color: var(--primary);
            }
            button,
            label {
                min-height: 2.25rem;
            }
            button:has(.radix-icon):not(.nav-item),
            label:has(.radix-icon) {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                gap: 0.45rem;
            }
            input,
            textarea,
            select,
            button {
                transition:
                    border-color 0.12s ease,
                    background-color 0.12s ease,
                    color 0.12s ease,
                    opacity 0.12s ease;
            }
            .card-line-repeatable {
                background: var(--secondary);
            }
            .card-line-casual {
                background: var(--tertiary);
            }
            .card-line-manual {
                background: var(--ok);
            }
            .card-line-custom {
                background: var(--muted);
            }
            .card-line-denpie {
                background: var(--primary);
            }
            .tip-type-switch button {
                color: var(--muted);
            }
            .tip-type-switch button.active {
                background: var(--primary-soft);
                color: var(--primary);
            }
            .hidden-view {
                display: none;
            }
            @keyframes page-enter {
                from {
                    opacity: 0;
                    transform: translateY(8px) scale(0.995);
                }
                to {
                    opacity: 1;
                    transform: translateY(0) scale(1);
                }
            }
            @keyframes card-enter {
                from {
                    opacity: 0;
                    transform: translateY(10px) scale(0.985);
                }
                to {
                    opacity: 1;
                    transform: translateY(0) scale(1);
                }
            }
            @keyframes card-text-snap {
                from {
                    opacity: 0.45;
                    transform: translateY(5px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
            @keyframes fullscreen-card-enter {
                from {
                    opacity: 0.72;
                    transform: translateY(12px) scale(0.985);
                }
                to {
                    opacity: 1;
                    transform: translateY(0) scale(1);
                }
            }
            #login-panel,
            #app-shell:not(.hidden),
            main > section:not(.hidden-view) {
                animation: page-enter 140ms cubic-bezier(0.2, 0, 0, 1);
            }
            .toast {
                position: fixed;
                left: 50%;
                bottom: 24px;
                transform: translate(-50%, 20px);
                opacity: 0;
                pointer-events: none;
                transition:
                    opacity 0.2s ease,
                    transform 0.2s ease;
                z-index: 80;
            }
            .toast.show {
                opacity: 1;
                transform: translate(-50%, 0);
            }
            .update-popup {
                position: fixed;
                inset: 0;
                display: none;
                align-items: center;
                justify-content: center;
                padding: 24px;
                background: color-mix(in srgb, var(--bg) 70%, transparent);
                z-index: 90;
            }
            .update-popup.show {
                display: flex;
            }
            .update-progress-track {
                height: 8px;
                overflow: hidden;
                background: hsl(var(--muted-hsl) / var(--glass-muted-alpha));
                border: 1px solid var(--border);
                border-radius: 999px;
                backdrop-filter: blur(var(--glass-blur)) saturate(1.1);
            }
            html .update-progress-track {
                -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(1.1);
            }
            .update-progress-bar {
                height: 100%;
                width: 0%;
                background: var(--primary);
                transition: width 0.35s ease;
            }
            input,
            textarea,
            select {
                background: var(--surface);
                border-color: var(--border);
                color: var(--text);
            }
            select {
                color-scheme: inherit;
            }
            select option,
            select optgroup {
                background: hsl(var(--popover));
                color: hsl(var(--popover-foreground));
            }
            select option:checked {
                background: hsl(var(--accent-hsl));
                color: hsl(var(--accent-foreground));
            }
            .native-select-hidden {
                position: absolute;
                width: 1px;
                height: 1px;
                opacity: 0;
                pointer-events: none;
            }
            .shadcn-select {
                position: relative;
                width: 100%;
            }
            .shadcn-select .shadcn-select-trigger {
                display: flex;
                min-height: 2.5rem;
                width: 100%;
                align-items: center;
                justify-content: space-between;
                gap: 0.75rem;
                border: 1px solid hsl(var(--input-hsl));
                border-radius: var(--glass-control-radius);
                background: hsl(var(--background) / var(--glass-control-alpha));
                color: hsl(var(--foreground));
                padding: 0.5rem 0.75rem;
                text-align: left;
                box-shadow: 0 1px 1px rgba(0, 0, 0, 0.04);
                backdrop-filter: blur(var(--glass-blur)) saturate(1.1);
            }
            html .shadcn-select .shadcn-select-trigger {
                -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(1.1);
            }
            button.shadcn-select-trigger:has(.radix-icon):not(.nav-item) {
                display: flex;
                justify-content: space-between;
            }
            .shadcn-select-trigger:focus-visible {
                outline: none;
                border-color: hsl(var(--ring-hsl));
                box-shadow: 0 0 0 2px hsl(var(--ring-hsl) / 0.28);
            }
            .shadcn-select-trigger > .shadcn-select-label {
                flex: 1;
                text-align: left;
            }
            .shadcn-select-trigger .radix-icon {
                width: 1rem;
                height: 1rem;
                font-size: 1rem;
                color: hsl(var(--muted-foreground));
            }
            .shadcn-select-menu {
                position: absolute;
                left: 0;
                right: 0;
                top: calc(100% + 0.35rem);
                z-index: 120;
                max-height: min(18rem, 52vh);
                overflow-y: auto;
                border: 1px solid hsl(var(--border-hsl));
                border-radius: var(--glass-control-radius);
                background: hsl(var(--popover));
                color: hsl(var(--popover-foreground));
                padding: 0.25rem;
                box-shadow: 0 18px 48px -24px rgba(0, 0, 0, 0.72);
                backdrop-filter: none;
            }
            html .shadcn-select-menu {
                -webkit-backdrop-filter: none;
            }
            .shadcn-select-menu.opens-up {
                top: auto;
                bottom: calc(100% + 0.35rem);
            }
            .shadcn-select-menu.hidden {
                display: none;

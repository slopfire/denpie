        <script>
            window.DenpieHighlight = (() => {
                const shikiModule = import("https://esm.sh/shiki@4.1.0");
                const themes = {
                    light: "vitesse-light",
                    dark: "vitesse-dark",
                };

                const resetButton = (button, label) => {
                    window.setTimeout(() => {
                        button.textContent = label;
                        button.classList.remove("copied");
                    }, 1200);
                };

                const installCopyHandler = (root) => {
                    if (!root || root.dataset.codeCopyReady === "true") {
                        return;
                    }
                    root.dataset.codeCopyReady = "true";
                    root.addEventListener("click", async (event) => {
                        const target = event.target;
                        if (!(target instanceof Element)) {
                            return;
                        }
                        const button = target.closest(".code-block-copy");
                        if (!button || !root.contains(button)) {
                            return;
                        }
                        const shell = button.closest(".code-block-shell");
                        const code = shell?.querySelector("pre code");
                        const text = code?.innerText ?? "";
                        if (!text) {
                            return;
                        }
                        const original = button.textContent || "Copy";
                        try {
                            await navigator.clipboard.writeText(text);
                            button.textContent = "Copied";
                            button.classList.add("copied");
                        } catch (_error) {
                            button.textContent = "Copy failed";
                        }
                        resetButton(button, original);
                    });
                };

                const setPlaintextFallback = (shell, code) => {
                    shell.dataset.shikiHighlighted = "yes";
                    code.className = "language-plaintext";
                };

                const replaceCodeBlock = async (shell, code) => {
                    if (shell.dataset.shikiHighlighted) {
                        return;
                    }
                    shell.dataset.shikiHighlighted = "pending";

                    const lang = code.dataset.lang || "plaintext";
                    const codeText = code.textContent || "";
                    try {
                        const { codeToHtml } = await shikiModule;
                        const highlighted = await codeToHtml(codeText, {
                            lang,
                            themes,
                            defaultColor: false,
                        });
                        const template = document.createElement("template");
                        template.innerHTML = highlighted.trim();
                        const shikiPre = template.content.querySelector("pre");
                        const currentPre = code.closest("pre");
                        if (!shikiPre || !currentPre) {
                            setPlaintextFallback(shell, code);
                            return;
                        }
                        shikiPre.classList.add("code-block");
                        shikiPre.dataset.lang = lang;
                        shikiPre.removeAttribute("tabindex");
                        currentPre.replaceWith(shikiPre);
                        shell.dataset.shikiHighlighted = "yes";
                    } catch (_error) {
                        try {
                            const { codeToHtml } = await shikiModule;
                            const fallback = await codeToHtml(codeText, {
                                lang: "plaintext",
                                themes,
                                defaultColor: false,
                            });
                            const template = document.createElement("template");
                            template.innerHTML = fallback.trim();
                            const shikiPre = template.content.querySelector("pre");
                            const currentPre = code.closest("pre");
                            if (!shikiPre || !currentPre) {
                                setPlaintextFallback(shell, code);
                                return;
                            }
                            shikiPre.classList.add("code-block");
                            shikiPre.dataset.lang = "plaintext";
                            shikiPre.removeAttribute("tabindex");
                            currentPre.replaceWith(shikiPre);
                            shell.dataset.shikiHighlighted = "yes";
                        } catch (_fallbackError) {
                            setPlaintextFallback(shell, code);
                        }
                    }
                };

                const highlightCard = (root) => {
                    installCopyHandler(root);
                    if (!root) {
                        return;
                    }
                    root.querySelectorAll(".code-block-shell").forEach((shell) => {
                        const code = shell.querySelector("pre code");
                        if (code) {
                            void replaceCodeBlock(shell, code);
                        }
                    });
                };

                return { highlightCard };
            })();

            if ("serviceWorker" in navigator) {
                window.addEventListener("load", () => {
                    navigator.serviceWorker
                        .register("/service-worker.js")
                        .catch(() => undefined);
                });
            }
        </script>

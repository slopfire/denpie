<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Daily Tip</title>
  <style>
    :root { color-scheme: light; --bg:#f8fafc; --card:#fff; --line:#cbd5e1; --text:#0f172a; --muted:#64748b; --blue:#2563eb; --bad:#dc2626; }
    * { box-sizing: border-box; }
    body { margin: 0; font: 15px/1.5 system-ui, -apple-system, Segoe UI, sans-serif; background: var(--bg); color: var(--text); }
    main { max-width: 1180px; margin: 0 auto; padding: 24px; }
    header { display:flex; gap:16px; justify-content:space-between; align-items:center; margin-bottom:24px; }
    h1 { margin:0; font-size:28px; }
    h2 { margin:0 0 12px; font-size:18px; }
    section { background:var(--card); border:1px solid var(--line); border-radius:10px; padding:16px; margin-bottom:16px; }
    .grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap:16px; }
    label { display:block; font-size:12px; font-weight:700; color:var(--muted); text-transform:uppercase; margin:10px 0 4px; }
    input, textarea, select { width:100%; border:1px solid var(--line); border-radius:8px; padding:10px; font:inherit; background:white; }
    textarea { min-height:90px; resize:vertical; }
    button { border:1px solid var(--line); background:white; border-radius:8px; padding:9px 12px; font-weight:700; cursor:pointer; }
    button.primary { background:var(--blue); border-color:var(--blue); color:white; }
    button.danger { color:var(--bad); }
    .row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
    .muted { color:var(--muted); }
    .hidden { display:none; }
    .cards { display:grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap:12px; }
    .tip { border:1px solid var(--line); border-radius:10px; padding:12px; background:#fff; }
    code { display:block; white-space:pre-wrap; overflow-wrap:anywhere; background:#f1f5f9; border-radius:8px; padding:10px; }
    .toast { position:fixed; left:50%; bottom:20px; transform:translateX(-50%); background:#0f172a; color:white; padding:10px 14px; border-radius:8px; opacity:0; transition:.2s; }
    .toast.show { opacity:1; }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>Daily Tip</h1>
        <div class="muted">Single-user protobuf control panel</div>
      </div>
      <button id="refresh" class="primary">Refresh</button>
    </header>

    <section id="auth">
      <h2>Access</h2>
      <label>API Key</label>
      <input id="api-key" type="password" placeholder="sk_live_...">
      <div class="row">
        <button id="save-key" class="primary">Use Key</button>
        <button id="show-bootstrap">Bootstrap Key</button>
      </div>
      <div id="bootstrap" class="hidden">
        <label>Admin Token</label>
        <input id="admin-token" type="password">
        <label>Client Name</label>
        <input id="bootstrap-name" value="browser">
        <button id="bootstrap-btn" class="primary">Create API Key</button>
      </div>
      <p class="muted">Key is stored in localStorage for this browser.</p>
    </section>

    <div id="app" class="hidden">
      <div class="grid">
        <section>
          <h2>Summary</h2>
          <div id="summary" class="cards"></div>
        </section>

        <section>
          <h2>Settings</h2>
          <label>Model</label><input id="model">
          <label>Compress Model</label><input id="compress-model">
          <label>Prompt Template</label><textarea id="template"></textarea>
          <label>LLM API Key</label><input id="llm-key" type="password">
          <label>Base URL</label><input id="base-url">
          <label>Compress Base URL</label><input id="compress-base-url">
          <div class="row">
            <button id="save-settings" class="primary">Save Settings</button>
          </div>
        </section>
      </div>

      <section>
        <h2>Get Tips</h2>
        <div class="grid">
          <div><label>Topics</label><input id="tip-topics" placeholder="rust, python"></div>
          <div><label>Type</label><select id="tip-type"><option value="srs_tip">SRS</option><option value="repeatable_tip">Repeatable</option><option value="casual_tip">Casual</option></select></div>
          <div><label>Class</label><input id="tip-class" value="default"></div>
          <div><label>Count</label><input id="tip-count" type="number" min="1" value="1"></div>
        </div>
        <button id="get-tips" class="primary">Get Tips</button>
        <div id="tips" class="cards" style="margin-top:12px"></div>
      </section>

      <div class="grid">
        <section>
          <h2>Topics</h2>
          <div id="topics"></div>
        </section>

        <section>
          <h2>API Keys</h2>
          <label>New Key Name</label><input id="new-key-name" value="client">
          <button id="create-key" class="primary">Create Key</button>
          <div id="new-key"></div>
          <div id="keys"></div>
        </section>
      </div>

      <section>
        <h2>Cards</h2>
        <div id="cards" class="cards"></div>
      </section>
    </div>
  </main>
  <div id="toast" class="toast"></div>

  <script type="module">
    import protobuf from 'https://cdn.jsdelivr.net/npm/protobufjs@7.4.0/+esm';

    const proto = `syntax = "proto3";
package dailytip;
message TipsQuery { uint64 count = 1; string topics = 2; string topic_class = 3; string tipcard_type = 4; repeated int64 exclude_card_ids = 5; }
message TipCardResponse { int64 id = 1; string topic = 2; string full_content = 3; string compressed_content = 4; string topic_class = 5; string tipcard_type = 6; }
message TipsResponse { repeated TipCardResponse tips = 1; }
message ReviewPayload { int64 card_id = 1; uint32 grade = 2; string action = 3; }
message GetTopicsResponse { repeated string topics = 1; }
message TopicClass { int64 id = 1; string name = 2; string tipcard_type = 3; }
message GetTopicClassesResponse { repeated TopicClass classes = 1; }
message Empty {}
message ApiRequest { string auth = 1; oneof op { BootstrapApiKeyRequest bootstrap_api_key = 2; TipsQuery tips = 3; ReviewPayload review = 4; Empty get_topics = 5; Empty get_topic_classes = 6; Empty get_settings = 7; UpdateSettingsRequest update_settings = 8; CreateApiKeyRequest create_api_key = 9; Empty list_api_keys = 10; DeleteByIdRequest delete_api_key = 11; Empty list_admin_topics = 12; Empty list_tipcards = 13; DeleteByIdRequest delete_tipcard = 14; Empty get_summary = 15; Empty list_app_topics = 16; UpdateTopicRequest update_topic = 17; } }
message ApiResponse { oneof result { ApiKeyCreated api_key_created = 1; TipsResponse tips = 2; Empty ok = 3; GetTopicsResponse topics = 4; GetTopicClassesResponse topic_classes = 5; Settings settings = 6; ApiKeys api_keys = 7; AdminTopics admin_topics = 8; Tipcards tipcards = 9; AppSummary summary = 10; AppTopics app_topics = 11; } }
message BootstrapApiKeyRequest { string admin_token = 1; string client_name = 2; }
message CreateApiKeyRequest { string client_name = 1; }
message ApiKeyCreated { string api_key = 1; }
message DeleteByIdRequest { int64 id = 1; }
message Settings { string model = 1; string compress_model = 2; string template = 3; string api_key = 4; string base_url = 5; string compress_base_url = 6; string reasoning_effort = 7; string compress_reasoning_effort = 8; string color_scheme = 9; bool autoupdate_enabled = 10; string autoupdate_repo = 11; string autoupdate_branch = 12; uint64 autoupdate_check_interval_secs = 13; string autoupdate_command = 14; string autoupdate_last_seen_sha = 15; }
message UpdateSettingsRequest { optional string model = 1; optional string compress_model = 2; optional string template = 3; optional string api_key = 4; optional string base_url = 5; optional string compress_base_url = 6; optional string reasoning_effort = 7; optional string compress_reasoning_effort = 8; optional string color_scheme = 9; optional bool autoupdate_enabled = 10; optional string autoupdate_repo = 11; optional string autoupdate_branch = 12; optional uint64 autoupdate_check_interval_secs = 13; optional string autoupdate_command = 14; }
message ApiKeyInfo { int64 id = 1; string client_name = 2; string created_at = 3; }
message ApiKeys { repeated ApiKeyInfo keys = 1; }
message AdminTopic { int64 id = 1; string name = 2; string prompt_template = 3; }
message AdminTopics { repeated AdminTopic topics = 1; }
message TipcardInfo { int64 id = 1; string topic_name = 2; string full_content = 3; string compressed_content = 4; string created_at = 5; string tipcard_type = 6; string topic_class = 7; string status = 8; string next_review_at = 9; uint32 repeat_count = 10; }
message Tipcards { repeated TipcardInfo cards = 1; }
message AppSummary { int64 topics = 1; int64 total_cards = 2; int64 due_cards = 3; int64 active_cards = 4; }
message AppTopicInfo { int64 id = 1; string name = 2; string class_name = 3; string tipcard_type = 4; string prompt_template = 5; int64 total_cards = 6; int64 due_cards = 7; int64 completed_cards = 8; }
message AppTopics { repeated AppTopicInfo topics = 1; }
message UpdateTopicRequest { int64 id = 1; optional string prompt_template = 2; }`;

    const root = protobuf.parse(proto).root;
    const ApiRequest = root.lookupType('dailytip.ApiRequest');
    const ApiResponse = root.lookupType('dailytip.ApiResponse');
    const $ = (id) => document.getElementById(id);
    const esc = (v) => String(v ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    const key = () => $('api-key').value.trim();

    function toast(msg) {
      $('toast').textContent = msg;
      $('toast').classList.add('show');
      setTimeout(() => $('toast').classList.remove('show'), 1800);
    }

    async function call(op, body = {}, auth = key()) {
      const payload = ApiRequest.encode(ApiRequest.create({ auth, [op]: body })).finish();
      const res = await fetch('/api', { method: 'POST', headers: { 'Content-Type': 'application/x-protobuf' }, body: payload });
      if (!res.ok) throw new Error(`${res.status} ${await res.text()}`);
      return ApiResponse.decode(new Uint8Array(await res.arrayBuffer()));
    }

    function setAuthed(value) {
      $('app').classList.toggle('hidden', !value);
    }

    async function refresh() {
      const [settings, summary, topics, keys, cards] = await Promise.all([
        call('get_settings', {}),
        call('get_summary', {}),
        call('list_app_topics', {}),
        call('list_api_keys', {}),
        call('list_tipcards', {}),
      ]);
      renderSettings(settings.settings);
      renderSummary(summary.summary);
      renderTopics(topics.app_topics?.topics || []);
      renderKeys(keys.api_keys?.keys || []);
      renderCards(cards.tipcards?.cards || []);
      setAuthed(true);
    }

    function renderSettings(s = {}) {
      $('model').value = s.model || '';
      $('compress-model').value = s.compress_model || '';
      $('template').value = s.template || '';
      $('llm-key').value = s.api_key || '';
      $('base-url').value = s.base_url || '';
      $('compress-base-url').value = s.compress_base_url || '';
    }

    function renderSummary(s = {}) {
      $('summary').innerHTML = [
        ['Topics', s.topics || 0], ['Total Cards', s.total_cards || 0],
        ['Due Cards', s.due_cards || 0], ['Active Cards', s.active_cards || 0],
      ].map(([k,v]) => `<div class="tip"><div class="muted">${k}</div><strong>${v}</strong></div>`).join('');
    }

    function renderTopics(topics) {
      $('topics').innerHTML = topics.map(t => `<div class="tip"><strong>${esc(t.name)}</strong><div class="muted">${esc(t.class_name)} / ${esc(t.tipcard_type)} / ${t.due_cards} due</div></div>`).join('') || '<p class="muted">No topics.</p>';
    }

    function renderKeys(keys) {
      $('keys').innerHTML = keys.map(k => `<div class="tip row"><div style="flex:1"><strong>${esc(k.client_name)}</strong><div class="muted">${esc(k.created_at)}</div></div><button class="danger" data-delete-key="${k.id}">Delete</button></div>`).join('') || '<p class="muted">No keys.</p>';
      document.querySelectorAll('[data-delete-key]').forEach(btn => btn.onclick = async () => {
        await call('delete_api_key', { id: Number(btn.dataset.deleteKey) });
        await refresh();
      });
    }

    function renderCards(cards) {
      $('cards').innerHTML = cards.map(c => `<div class="tip"><div class="row"><strong style="flex:1">${esc(c.topic_name)}</strong><span class="muted">${esc(c.status)} / ${esc(c.tipcard_type)}</span><button class="danger" data-delete-card="${c.id}">Delete</button></div><p>${esc(c.compressed_content || c.full_content)}</p></div>`).join('') || '<p class="muted">No cards.</p>';
      document.querySelectorAll('[data-delete-card]').forEach(btn => btn.onclick = async () => {
        await call('delete_tipcard', { id: Number(btn.dataset.deleteCard) });
        await refresh();
      });
    }

    function renderTips(tips) {
      $('tips').innerHTML = tips.map(t => `<div class="tip"><div class="row"><strong style="flex:1">${esc(t.topic)}</strong><span class="muted">${esc(t.topic_class)} / ${esc(t.tipcard_type)}</span></div><p>${esc(t.full_content)}</p><div class="row"><button data-review="${t.id}" data-action="" data-grade="1">Again</button><button data-review="${t.id}" data-action="" data-grade="3">Good</button><button data-review="${t.id}" data-action="" data-grade="5">Easy</button><button data-review="${t.id}" data-action="dismiss" data-grade="0">Dismiss</button><button data-review="${t.id}" data-action="acknowledge" data-grade="3">Ack</button><button data-review="${t.id}" data-action="repeat" data-grade="3">Repeat</button><button data-review="${t.id}" data-action="memorize" data-grade="5">Memorize</button></div></div>`).join('');
      document.querySelectorAll('[data-review]').forEach(btn => btn.onclick = async () => {
        await call('review', { card_id: Number(btn.dataset.review), grade: Number(btn.dataset.grade), action: btn.dataset.action });
        toast('Review saved');
        await refresh();
      });
    }

    $('api-key').value = localStorage.getItem('dailytip-api-key') || '';
    $('save-key').onclick = async () => {
      localStorage.setItem('dailytip-api-key', key());
      await refresh().catch(e => toast(e.message));
    };
    $('show-bootstrap').onclick = () => $('bootstrap').classList.toggle('hidden');
    $('bootstrap-btn').onclick = async () => {
      const res = await call('bootstrap_api_key', { admin_token: $('admin-token').value, client_name: $('bootstrap-name').value }, '');
      $('api-key').value = res.api_key_created.api_key;
      localStorage.setItem('dailytip-api-key', key());
      toast('Key created');
      await refresh();
    };
    $('refresh').onclick = () => refresh().catch(e => toast(e.message));
    $('save-settings').onclick = async () => {
      await call('update_settings', {
        model: $('model').value,
        compress_model: $('compress-model').value,
        template: $('template').value,
        api_key: $('llm-key').value,
        base_url: $('base-url').value,
        compress_base_url: $('compress-base-url').value,
      });
      toast('Settings saved');
      await refresh();
    };
    $('get-tips').onclick = async () => {
      const res = await call('tips', {
        count: Number($('tip-count').value) || 1,
        topics: $('tip-topics').value,
        topic_class: $('tip-class').value,
        tipcard_type: $('tip-type').value,
      });
      renderTips(res.tips?.tips || []);
      await refresh();
    };
    $('create-key').onclick = async () => {
      const res = await call('create_api_key', { client_name: $('new-key-name').value || 'client' });
      $('new-key').innerHTML = `<label>New Key</label><code>${esc(res.api_key_created.api_key)}</code>`;
      await refresh();
    };

    if (key()) refresh().catch(() => setAuthed(false));
  </script>
</body>
</html>

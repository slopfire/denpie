name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.95.0
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler sqlite3

      - name: Install Trunk
        run: cargo install trunk --locked

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run Clippy
        run: DENPIE_SKIP_FRONTEND_BUILD=1 cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        run: DENPIE_SKIP_FRONTEND_BUILD=1 cargo test --workspace

      - name: Build frontend
        run: cd frontend && env -u NO_COLOR trunk build --release
